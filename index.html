<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Флаги Мира — Угадай Страну</title>
<meta property="og:type" content="website">
<meta property="og:url" content="https://ithemaybe.github.io/">
<meta property="og:title" content="Флаги Мира 🌍 — Угадай Страну">
<meta property="og:description" content="60 секунд — сколько флагов угадаешь? 190+ стран мира. Сыграй и кинь вызов другу!">
<meta property="og:image" content="https://flagcdn.com/w640/un.png">
<meta property="og:locale" content="ru_RU">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Флаги Мира 🌍 — Угадай Страну">
<meta name="twitter:description" content="60 секунд — сколько флагов угадаешь? 190+ стран мира.">
<meta name="twitter:image" content="https://flagcdn.com/w640/un.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .record-card {
    width: 100%;
    background: var(--card, #161b2e);
    border: 1px solid var(--border, #232a42);
    border-radius: 20px;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .record-left { display: flex; flex-direction: column; gap: .2rem; }
  .record-label {
    font-size: .7rem; letter-spacing: .08em;
    color: var(--muted, #6b7494);
    text-transform: uppercase;
    font-family: 'Unbounded', sans-serif;
  }
  .record-value {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.8rem; font-weight: 800;
    color: #f5c842;
  }
  .record-sub { font-size: .8rem; color: var(--muted, #6b7494); }
  .record-icon { font-size: 2.5rem; filter: drop-shadow(0 0 12px rgba(245,200,66,.4)); }

  .new-record-banner {
    align-items: center; justify-content: center; gap: .5rem;
    background: linear-gradient(135deg, rgba(245,200,66,.15), rgba(245,200,66,.05));
    border: 1px solid rgba(245,200,66,.35);
    border-radius: 16px; padding: .75rem 1.2rem;
    font-family: 'Unbounded', sans-serif;
    font-size: .85rem; font-weight: 700;
    color: #f5c842;
    width: 100%;
  }
</style>
</head>
<body>

<img id="swimming-cat" src="" alt="">
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="wrapper">

  <!-- HERO / START SCREEN -->
  <div id="start-screen" class="screen active">
    <a href="v2.html" class="btn-v2-mode" title="V2 режим — угадай страны по названию">
      <span class="btn-v2-badge">V2</span>
      <span class="btn-v2-label">Режим</span>
      <span class="btn-v2-arrow">→</span>
    </a>
    <div class="hero-icon">🌍</div>
    <h1 class="hero-title">Флаги<br><span>Мира</span></h1>
    <p class="hero-sub">Угадай страну по флагу.<br>60 секунд — сколько успеешь?</p>

    <!-- Плашка рекорда -->
    <div class="record-card" id="record-card">
      <div class="record-left">
        <div class="record-label">🏅 Личный рекорд</div>
        <div class="record-value" id="record-count">—</div>
        <div class="record-sub"  id="record-sub">Сыграй первую партию!</div>
      </div>
      <div class="record-icon">🏆</div>
    </div>

    <button class="btn-start" id="btn-start">Начать игру</button>
    <div class="hero-hint">← → кнопки 1–4 для ответа</div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <div class="game-header">
      <div class="stat-box">
        <span class="stat-label">Верно</span>
        <span class="stat-val correct-count" id="score-correct">0</span>
      </div>
      <div class="timer-ring" id="timer-ring">
        <svg viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="50"/>
          <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="50"
            stroke-dasharray="314" stroke-dashoffset="0"/>
        </svg>
        <span id="timer-text">60</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Ошибок</span>
        <span class="stat-val wrong-count" id="score-wrong">0</span>
      </div>
    </div>

    <div class="flag-stage" id="flag-stage">
      <img class="flag-img" id="flag-img" src="" alt="" draggable="false">
      <div class="flag-shine"></div>
    </div>

    <div class="options-grid" id="options-grid">
      <button class="opt-btn" data-idx="0"><span class="key-hint">1</span><span class="opt-text"></span></button>
      <button class="opt-btn" data-idx="1"><span class="key-hint">2</span><span class="opt-text"></span></button>
      <button class="opt-btn" data-idx="2"><span class="key-hint">3</span><span class="opt-text"></span></button>
      <button class="opt-btn" data-idx="3"><span class="key-hint">4</span><span class="opt-text"></span></button>
    </div>

    <div class="feedback" id="feedback"></div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen" class="screen">
    <div class="result-trophy" id="result-trophy">🏆</div>
    <h2 class="result-title">Игра окончена!</h2>

    <!-- Баннер нового рекорда -->
    <div class="new-record-banner" id="new-record-banner" style="display:none;">
      🎉 Новый личный рекорд!
    </div>

    <div class="result-stats">
      <div class="rs-box rs-correct">
        <div class="rs-num" id="res-correct">0</div>
        <div class="rs-label">Угадано</div>
      </div>
      <div class="rs-divider">|</div>
      <div class="rs-box rs-wrong">
        <div class="rs-num" id="res-wrong">0</div>
        <div class="rs-label">Ошибок</div>
      </div>
      <div class="rs-divider">|</div>
      <div class="rs-box rs-total">
        <div class="rs-num" id="res-total">0</div>
        <div class="rs-label">Всего</div>
      </div>
    </div>

    <div class="result-pct">
      <div class="pct-bar"><div class="pct-fill" id="pct-fill"></div></div>
      <div class="pct-text" id="pct-text">0% правильных</div>
    </div>

    <!-- Поле с ссылкой -->
    <div class="share-box">
      <span class="share-label">Ссылка на результат:</span>
      <div class="share-row">
        <input class="share-input" id="share-url" readonly>
        <button class="copy-btn" id="copy-btn" title="Скопировать">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-start" id="btn-again">Играть снова</button>
  </div>

</div>

<script src="game.js"></script>
<script src="swimming-cat.js"></script>

<!-- Плашка рекорда на старт-экране -->
<script>
(function () {
  function renderRecord() {
    const rec = JSON.parse(localStorage.getItem('v1_record') || 'null');
    const countEl = document.getElementById('record-count');
    const subEl   = document.getElementById('record-sub');
    if (!countEl || !subEl) return;
    if (rec) {
      countEl.textContent = rec.correct + ' из ' + rec.total;
      subEl.textContent   = rec.pct + '% точность · ' + (rec.date || '');
    } else {
      countEl.textContent = '—';
      subEl.textContent   = 'Сыграй первую партию!';
    }
  }

  renderRecord();

  // Обновляем плашку при возврате на старт
  document.getElementById('btn-again')?.addEventListener('click', () => {
    setTimeout(renderRecord, 50);
  });
})();
</script>

</body>
</html>
