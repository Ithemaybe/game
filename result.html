<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Результат — Флаги Мира</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .record-card {
    width: 100%;
    background: var(--card, #161b2e);
    border: 1px solid var(--border, #232a42);
    border-radius: 20px;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .record-left { display: flex; flex-direction: column; gap: .2rem; }
  .record-label {
    font-size: .7rem; letter-spacing: .08em;
    color: var(--muted, #6b7494);
    text-transform: uppercase;
    font-family: 'Unbounded', sans-serif;
  }
  .record-value {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.6rem; font-weight: 800;
    color: #f5c842;
  }
  .record-sub { font-size: .8rem; color: var(--muted, #6b7494); }
  .record-icon { font-size: 2.2rem; filter: drop-shadow(0 0 10px rgba(245,200,66,.4)); }
  .notfound-state {
    display: flex; flex-direction: column;
    align-items: center; gap: 1.5rem;
    text-align: center;
  }
</style>
</head>
<body>

<img id="swimming-cat" src="" alt="">
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="wrapper">
  <div class="screen active" style="text-align:center;" id="result-block">

    <!-- Найден результат -->
    <div id="found-state" style="display:none; flex-direction:column; align-items:center; gap:1.5rem;">
      <div class="result-trophy anim-in" id="result-trophy">🏆</div>
      <h2 class="result-title anim-in" style="animation-delay:.1s">Результат игры</h2>
      <p class="hero-sub anim-in" id="result-date" style="animation-delay:.15s; opacity:.5; font-size:.85rem;"></p>

      <div class="result-stats anim-in" style="animation-delay:.2s">
        <div class="rs-box rs-correct">
          <div class="rs-num" id="res-correct">0</div>
          <div class="rs-label">Угадано</div>
        </div>
        <div class="rs-divider">|</div>
        <div class="rs-box rs-wrong">
          <div class="rs-num" id="res-wrong">0</div>
          <div class="rs-label">Ошибок</div>
        </div>
        <div class="rs-divider">|</div>
        <div class="rs-box rs-total">
          <div class="rs-num" id="res-total">0</div>
          <div class="rs-label">Всего</div>
        </div>
      </div>

      <div class="result-pct anim-in" style="animation-delay:.3s; width:100%">
        <div class="pct-bar">
          <div class="pct-fill" id="pct-fill" style="width:0%"></div>
        </div>
        <div class="pct-text" id="pct-text">0% правильных</div>
      </div>

      <!-- Личный рекорд (только если открыт на том же устройстве) -->
      <div class="record-card anim-in" id="record-block" style="animation-delay:.35s; display:none;">
        <div class="record-left">
          <div class="record-label">🏅 Личный рекорд</div>
          <div class="record-value" id="record-value">—</div>
          <div class="record-sub"   id="record-sub"></div>
        </div>
        <div class="record-icon">🏆</div>
      </div>

      <!-- Поле с ссылкой -->
      <div class="share-box anim-in" style="animation-delay:.4s; width:100%">
        <span class="share-label">Ссылка на этот результат:</span>
        <div class="share-row">
          <input class="share-input" id="share-url" readonly>
          <button class="copy-btn" id="copy-btn" title="Скопировать">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>
      </div>

      <a href="index.html" class="btn-start" style="display:inline-block; text-decoration:none; margin-top:.5rem;">
        Играть снова
      </a>
    </div>

    <!-- Результат не найден -->
    <div id="notfound-state" class="notfound-state" style="display:none;">
      <div class="hero-icon">🚩</div>
      <h2 class="result-title">Результат не найден</h2>
      <p class="hero-sub">Ссылка устарела или недействительна.<br>Результаты хранятся только в браузере игрока.</p>
      <a href="index.html" class="btn-start" style="display:inline-block; text-decoration:none;">
        На главную
      </a>
    </div>

  </div>
</div>

<script>
(function () {
  const key    = location.hash.slice(1);           // всё после #
  const stored = key ? localStorage.getItem('v1_result_' + key) : null;
  const data   = stored ? JSON.parse(stored) : null;

  const foundEl    = document.getElementById('found-state');
  const notfoundEl = document.getElementById('notfound-state');

  if (!data) {
    notfoundEl.style.display = 'flex';
    return;
  }

  foundEl.style.display = 'flex';

  const { correct, wrong, total, pct, date } = data;

  document.getElementById('result-trophy').textContent =
    pct >= 80 ? '🏆' : pct >= 50 ? '🥈' : '🌍';

  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent   = wrong;
  document.getElementById('res-total').textContent   = total;
  document.getElementById('result-date').textContent = date || '';
  document.getElementById('pct-text').textContent    = pct + '% правильных';
  document.getElementById('share-url').value         = location.href;

  requestAnimationFrame(() => {
    document.getElementById('pct-fill').style.width = pct + '%';
  });

  // Показываем рекорд если открыто на том же устройстве
  const record = JSON.parse(localStorage.getItem('v1_record') || 'null');
  if (record) {
    const recBlock = document.getElementById('record-block');
    recBlock.style.display = 'flex';
    document.getElementById('record-value').textContent =
      record.correct + ' из ' + record.total;
    document.getElementById('record-sub').textContent =
      record.pct + '% точность · ' + (record.date || '');
  }

  // Копирование ссылки
  document.getElementById('copy-btn').addEventListener('click', () => {
    const url = document.getElementById('share-url');
    navigator.clipboard.writeText(url.value).catch(() => {
      url.select(); document.execCommand('copy');
    });
    const btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    setTimeout(() => btn.classList.remove('copied'), 1500);
  });
})();
</script>

<script src="swimming-cat.js"></script>
</body>
</html>
